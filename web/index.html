<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MultiMinesweeper Normal MVP</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 24px; background: #f7f7f7; color: #1f2937; }
    .bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    input, button { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; }
    button { cursor: pointer; }
    button:hover { background: #f1f5f9; }
    #status { margin: 12px 0; font-size: 14px; color: #475569; }
    #players { display: flex; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
    .player { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; min-width: 180px; }
    .me { border-color: #334155; }
    #board { display: grid; gap: 2px; width: max-content; user-select: none; }
    .cell { width: 32px; height: 32px; display: grid; place-items: center; border: 1px solid #94a3b8; border-radius: 4px; background: #cbd5e1; font-weight: 700; cursor: pointer; }
    .cell.revealed { background: #ffffff; cursor: default; }
    .cell.auto { outline: 2px solid #64748b; }
    .cell.start { outline: 2px solid #94a3b8; }
    .cell.p1 { outline: 2px solid #2563eb; }
    .cell.p2 { outline: 2px solid #dc2626; }
    .cell.mine { background: #fee2e2; color: #991b1b; }
    .n1 { color: #2563eb; } .n2 { color: #16a34a; } .n3 { color: #dc2626; }
    .n4 { color: #7c3aed; } .n5 { color: #b45309; } .n6 { color: #0891b2; }
    .n7 { color: #111827; } .n8 { color: #64748b; }
    .small { font-size: 12px; color: #64748b; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>MultiMinesweeper Normal MVP</h1>
  <div class="bar">
    <label>Room <input id="room" value="dev" /></label>
    <label>Name <input id="name" value="Alice" /></label>
    <button id="connect">Connect</button>
    <button id="resign">Resign</button>
  </div>
  <div id="status">Disconnected</div>
  <div id="players"></div>
  <div id="board"></div>

<script>
let ws = null;
let playerId = "";
let state = null;

const $ = (id) => document.getElementById(id);

const params = new URLSearchParams(location.search);
if (params.get("room")) $("room").value = params.get("room");
if (params.get("name")) $("name").value = params.get("name");

$("connect").onclick = () => {
  if (ws) ws.close();
  const room = encodeURIComponent($("room").value || "dev");
  const name = encodeURIComponent($("name").value || "Player");
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws?room=${room}&name=${name}`);

  ws.onopen = () => setStatus("Connected. Waiting for another player if the game has not started.");
  ws.onclose = () => setStatus("Disconnected");
  ws.onerror = () => setStatus("WebSocket error", true);
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "welcome") {
      playerId = msg.playerId;
      setStatus(`Connected as ${playerId}`);
    } else if (msg.type === "state") {
      state = msg.state;
      render();
    } else if (msg.type === "error") {
      setStatus(msg.error, true);
    }
  };
};

$("resign").onclick = () => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "resign" }));
};

function setStatus(text, isError = false) {
  $("status").textContent = text;
  $("status").className = isError ? "error" : "";
}

function render() {
  if (!state) return;
  renderPlayers();
  renderBoard();

  const phaseText = state.phase === "waiting"
    ? "Waiting for player 2"
    : state.phase === "playing"
      ? `Playing | Pool ${state.scorePool.toFixed(1)} | Idle ${Math.ceil(state.idleMsLeft / 1000)}s`
      : `Ended | ${state.result?.message || "game ended"}`;
  setStatus(`${phaseText} | Revealed ${state.revealedSafe}/${state.safeTotal}`);
}

function renderPlayers() {
  const box = $("players");
  box.innerHTML = "";
  for (const p of state.players) {
    const div = document.createElement("div");
    div.className = "player" + (p.id === playerId ? " me" : "");
    const marker = p.id === playerId ? " (me)" : "";
    div.innerHTML = `<b>${escapeHtml(p.name)}${marker}</b><br>Score: ${p.score.toFixed(1)}<br>Combo: ${p.combo}<br><span class="small">${p.connected ? "connected" : "disconnected"}</span>`;
    box.appendChild(div);
  }
}

function renderBoard() {
  const board = $("board");
  board.style.gridTemplateColumns = `repeat(${state.width}, 32px)`;
  board.innerHTML = "";

  const revealed = new Map();
  for (const c of state.revealed) revealed.set(`${c.x},${c.y}`, c);

  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const key = `${x},${y}`;
      const c = revealed.get(key);
      const cell = document.createElement("button");
      cell.className = "cell";
      cell.dataset.x = x;
      cell.dataset.y = y;

      if (c) {
        cell.classList.add("revealed");
        if (c.openedBy === "auto") cell.classList.add("auto");
        if (c.openedBy === "start") cell.classList.add("start");
        if (c.openedBy === "p1") cell.classList.add("p1");
        if (c.openedBy === "p2") cell.classList.add("p2");
        if (c.value === -1) {
          cell.textContent = "💣";
          cell.classList.add("mine");
        } else if (c.value > 0) {
          cell.textContent = c.value;
          cell.classList.add(`n${c.value}`);
        } else {
          cell.textContent = "";
        }
      } else {
        cell.onclick = () => reveal(x, y);
      }
      board.appendChild(cell);
    }
  }
}

function reveal(x, y) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: "reveal", x, y }));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>'"]/g, (ch) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#039;", '"': "&quot;"
  }[ch]));
}
</script>
</body>
</html>
